name: Keep Backend Warm

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Wake up Render backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://api.whereismymoneygo.com/)
          echo "Backend responded with HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: backend returned non-200 status"
            exit 0
          fi
